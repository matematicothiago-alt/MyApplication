workflows:
  android-debug:
    name: Build APK Debug
    max_build_duration: 60
    environment:
      groups:
        - google_credentials
    scripts:
      - name: Set gradlew permissions
        script: chmod +x ./gradlew
      - name: Build debug APK
        script: ./gradlew assembleDebug
    artifacts:
      - build/app/outputs/flutter-apk/debug/*.apk
